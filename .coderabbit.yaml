language: "en-US"
reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  sequence_diagrams: false
  assess_linked_issues: false
  related_issues: false
  related_prs: false
  suggested_labels: false
  suggested_reviewers: false
  auto_review:
    enabled: true
    drafts: false
  tone_instructions: >
    Be relaxed and pragmatic. Only flag real bugs, security issues, and
    logic correctness problems. Do not comment on style, formatting, naming, or
    other minor preferences. Skip nitpick comments. Keep comments short.
    This is a Vite + React + TypeScript piano app using Tone.js: focus on React
    correctness, audio lifecycle (Tone.start on first user gesture), key mapping,
    and song follow-along logic — not Tailwind, Framer Motion, or JSDoc style.
  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false
  path_filters:
    - "**/*.tsx"
    - "!**/*.ts"
    - "!**/*.js"
    - "!**/*.mjs"
    - "!**/*.cjs"
    - "!**/*.md"
    - "!**/*.json"
    - "!**/*.yaml"
    - "!**/*.yml"
    - "!**/*.css"
    - "!**/*.html"
    - "!**/*.mid"
    - "!**/*.midi"
    - "!**/*.svg"
    - "!**/*.png"
    - "!**/*.jpg"
    - "!**/*.jpeg"
    - "!**/*.gif"
    - "!**/*.webp"
    - "!**/*.ico"
    - "!**/*.lock"
    - "!dist/**"
    - "!node_modules/**"
    - "!public/**"
    - "!scripts/**"
    - "!**/.cursor/**"
